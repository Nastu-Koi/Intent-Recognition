# ============================================================================
# LLM 配置文件 (llm_config.yml) — OpenAI-Compatible 统一格式
# ============================================================================
#
# 所有 LLM 调用统一使用 ChatOpenAI (langchain_openai)。
# 通过 base_url 切换不同的 LLM 供应商。
#
# 环境变量覆盖（优先级最高）:
#   LLM_API_KEY       - API Key
#   LLM_BASE_URL      - API Base URL
#   LLM_MODEL         - 模型名称
#   LLM_TEMPERATURE   - 温度值 (0-1)
#
# ============================================================================

# ============================================================================
# LLM 配置 (OpenAI-Compatible)
# ============================================================================
llm:
  # API Key - 优先从环境变量 LLM_API_KEY 读取
  api_key: "${LLM_API_KEY}"

  # API Base URL - 切换不同的 LLM 供应商
  # ─────────────────────────────────────────
  # 阿里云 Qwen (推荐):
  #   https://dashscope.aliyuncs.com/compatible-mode/v1
  # OpenAI:
  #   https://api.openai.com/v1
  # DeepSeek:
  #   https://api.deepseek.com/v1
  # 本地 Ollama:
  #   http://localhost:11434/v1
  # 其他 OpenAI-compatible 服务:
  #   http://your-server/v1
  # ─────────────────────────────────────────
  base_url: "https://api.deepseek.com/v1"

  # 模型名称
  # ─────────────────────────────────────────
  # 阿里云 Qwen:
  #   qwen-max (推荐，最强大)
  #   qwen-plus (高效能)
  #   qwen-turbo (快速，低成本)
  #   qwen-long (超长上下文 200K tokens)
  # OpenAI:
  #   gpt-4o / gpt-4-turbo / gpt-3.5-turbo
  # DeepSeek:
  #   deepseek-chat / deepseek-reasoner
  # ─────────────────────────────────────────
  model: "deepseek-chat"

  # 温度参数 (0=精准, 1=创意)
  temperature: 0.7

  # 最大生成 tokens
  max_tokens: 4096

  # 请求超时时间（秒）
  timeout: 300


# ============================================================================
# Agent 推理配置
# ============================================================================
agent:
  # Planner-Evaluator 最大迭代轮次
  # 到达此数值后强制进入 Final Reply
  max_iterations: 5
